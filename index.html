<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8">
    <title>AR Demo System</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      /* 起動ボタン */
      #startButton {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        padding: 15px 30px; font-size: 18px; font-weight: bold;
        background-color: #007bff; color: white; border: none; border-radius: 30px;
        z-index: 1000; cursor: pointer;
      }
    </style>
  </head>
  
  <body>
    <button id="startButton">ARデモを開始</button>

    <a-scene mindar-image="imageTargetSrc: ./target.mind; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
     <a-assets>
 　　　 <a-asset-item id="myModel" src="sample.glb"></a-asset-item>
 　　　 <img id="myPhoto" src="sample.png">
　　　  <video id="myVideo" src="sample.mp4" loop="true" crossorigin="anonymous"></video>
　　　</a-assets>
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        
        <a-gltf-model id="glbEntity" src="#myModel" position="0 0 0" scale="1 1 1" rotation="90 0 0" animation-mixer="timeScale: 0"></a-gltf-model>

        </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector('#startButton');
      const glb = document.querySelector('#glbEntity');
      const video = document.querySelector('#videoEntity');
      const target = document.querySelector('#target');

      let isStarted = false;

      startButton.addEventListener('click', () => {
        startButton.style.display = 'none';
        isStarted = true;
        // 動画がある場合のみ初期化
        if(video) { video.pause(); video.currentTime = 0; }
      });

      target.addEventListener('targetFound', () => {
        if (!isStarted) return;
        // GLBのアニメーション開始
        if(glb) glb.setAttribute('animation-mixer', {timeScale: 1});
        // 動画がある場合は再生
        if(video) video.play();
      });

      target.addEventListener('targetLost', () => {
        if(glb) glb.setAttribute('animation-mixer', {timeScale: 0});
        if(video) video.pause();
      });
    </script>
  </body>
</html>
