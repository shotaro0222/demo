name: Compile Multiple MindAR Targets

on:
  push:
    paths:
      - '**/images/**'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install MindAR
        run: npm install mind-ar

      - name: Compile MindAR Targets
        run: |
          for dir in $(find . -type d -name "images"); do
            target_dir=$(dirname "$dir")
            # 画像がある場合のみコンパイル
            if ls "$dir"/*.{jpg,JPG,png,PNG} >/dev/null 2>&1; then
              echo "✅ Processing $target_dir..."
              ./node_modules/.bin/mindar-image-compiler "$dir" "$target_dir/targets.mind"
            else
              echo "⚠️ Skipping $target_dir... No images."
            fi
          done

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 💡 ここを修正: targets.mindが存在する場合のみaddし、なければ無視する
          find . -name "targets.mind" | xargs -r git add
          
          if ! git diff --cached --exit-code; then
            git commit -m "Automated compile: target.mind updated"
            git push
          else
            echo "No changes to commit"
          fi
          
- name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 念のため、生成されたファイルがあるか確認するログを追加
          ls -R
          
          find . -name "targets.mind" | xargs -r git add
          
          if ! git diff --cached --exit-code; then
            git commit -m "Automated compile: target.mind updated"
            # 💡 権限エラーを避けるため、トークンを使用してプッシュするように指定
            git push origin main
          else
            echo "No changes to commit"
          fi
