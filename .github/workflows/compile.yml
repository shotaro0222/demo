name: Compile Multiple MindAR Targets

on:
  push:
    paths:
      - '**/[iI]mages/**'

jobs:
  compile:
    runs-on: ubuntu-latest
    # 書き込み権限を確実に与える設定
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Compile MindAR Targets
        run: |
          # imagesフォルダを大文字小文字問わず検索
          find . -type d -iname "images" | while read dir; do
            target_dir=$(dirname "$dir")
            
            # フォルダが空でないか確認
            if [ "$(ls -A "$dir")" ]; then
              echo "✅ Processing $target_dir..."
              # npxでコンパイラを実行（場所の不一致を防ぐ）
              npx mind-ar-compiler "$dir" "$target_dir/targets.mind"
            else
              echo "⚠️ Skipping $target_dir... No images found."
            fi
          done

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 生成された.mindファイルを強制的にGitへ追加
          find . -name "targets.mind" -exec git add -f {} +
          
          # 変更がある場合のみ、実行番号を含めたメッセージでコミット
          if ! git diff --cached --exit-code; then
            git commit -m "Automated update: targets.mind (Run #${{ github.run_number }})"
            # 現在のブランチ(main)へ強制的に押し込む
            git push origin HEAD:main --force
          else
            echo "No changes detected. Nothing to commit."
          fi
