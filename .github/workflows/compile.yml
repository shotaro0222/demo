name: Compile Multiple MindAR Targets

on:
  push:
    paths:
      - '**/[iI]mages/**'
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへの書き込み権限を明示
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # 💡 認証トークンを使用して、書き込みを許可させる
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Compile MindAR Targets
        run: |
          find . -type d -iname "images" | while read dir; do
            target_dir=$(dirname "$dir")
            if [ "$(ls -A "$dir")" ]; then
              echo "✅ Compiling in $target_dir..."
              npx mind-ar-compiler "$dir" "$target_dir/targets.mind"
            fi
          done

      - name: Commit and Push
        run: |
          # ユーザー設定
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 作成されたファイルをすべて強制追加
          git add -f "**/targets.mind"
          
          # 変更がある場合のみコミット
          if git commit -m "Automated update: targets.mind (Run #${{ github.run_number }})"; then
            # mainブランチに直接プッシュ（HEADではなく明示的にmainを指定）
            git push origin main
          else
            echo "No changes to commit"
          fi
