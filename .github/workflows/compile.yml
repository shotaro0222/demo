name: Compile Multiple MindAR Targets

on:
  push:
    paths:
      - '**/images/**'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install MindAR
        run: npm install mind-ar

      - name: Compile MindAR Targets
        run: |
          # 全ての images フォルダを検索
          for dir in $(find . -type d -name "images"); do
            target_dir=$(dirname "$dir")
            
            # 💡 修正ポイント: フォルダ内に画像(jpg/png)があるかチェック
            if ls "$dir"/*.{jpg,JPG,png,PNG} >/dev/null 2>&1; then
              echo "✅ Processing $target_dir... images found."
              ./node_modules/.bin/mindar-image-compiler "$dir" "$target_dir/targets.mind"
            else
              echo "⚠️ Skipping $target_dir... No supported images found."
            fi
          done

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add "**/targets.mind"
          # 変更がある場合のみコミット
          if ! git diff --cached --exit-code; then
            git commit -m "Automated compile: target.mind updated"
            git push
          else
            echo "No changes to commit"
          fi
