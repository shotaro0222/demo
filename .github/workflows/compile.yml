name: Compile Multiple MindAR Targets

on:
  push:
    paths:
      - '**/[iI]mages/**'
  workflow_dispatch: # 💡 手動でも実行できるようにする

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 💡 権限を明示
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 💡 認証を通す
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Compile MindAR Targets
        run: |
          find . -type d -iname "images" | while read dir; do
            target_dir=$(dirname "$dir")
            if [ "$(ls -A "$dir")" ]; then
              echo "✅ Compiling in $target_dir..."
              npx mind-ar-compiler "$dir" "$target_dir/targets.mind"
            fi
          done

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 作成されたファイルを強制追加
          find . -name "targets.mind" -exec git add -f {} +
          
          # 履歴に強制的に刻む
          if git commit -m "chore: update targets.mind [skip ci]"; then
            git push origin HEAD:main --force
          else
            echo "No changes to commit"
          fi
