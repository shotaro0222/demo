name: Compile MindAR Targets

on:
  push:
    paths:
      - '**/images/**'
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install MindAR
        # 💡 本体をインストールし、コンパイラを直接実行できる環境を作ります
        run: npm install mind-ar@1.1.4

      - name: Compile MindAR Targets
        run: |
          find . -type d -iname "images" | while read dir; do
            target_dir=$(dirname "$dir")
            if [ "$(ls -A "$dir")" ]; then
              echo "✅ Compiling for $target_dir..."
              
              # 💡 node_modulesの中にあるコンパイラを直接実行
              ./node_modules/.bin/mind-ar-compiler "$dir" "$target_dir/targets.mind"
              
              if [ -f "$target_dir/targets.mind" ]; then
                echo "📊 Created: $target_dir/targets.mind"
              fi
            fi
          done

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "**/targets.mind"
          if git commit -m "chore: update targets.mind (Run #${{ github.run_number }})"; then
            git push origin HEAD:main --force
          else
            echo "No changes to commit"
          fi
