name: Compile Multiple MindAR Targets

on:
  push:
    paths:
      - '**/[iI]mages/**'

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 全履歴を取得してPushエラーを防ぐ

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Compile MindAR Targets
        run: |
          find . -type d -iname "images" | while read dir; do
            target_dir=$(dirname "$dir")
            if [ "$(ls -A "$dir")" ]; then
              echo "✅ Compiling in $dir..."
              # npxでコンパイラ実行
              npx mind-ar-compiler "$dir" "$target_dir/targets.mind"
            fi
          done

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 💡 強制的にすべての .mind ファイルを Git の管理下に入れる
          find . -name "targets.mind" -exec git add -f {} +
          
          # 💡 差分があろうとなかろうと、現在の状態を強制コミットする
          if git commit -m "Automated update: targets.mind $(date)"; then
            # メインブランチに直接押し込む
            git push origin HEAD:main --force
          else
            echo "No changes to commit"
          fi
