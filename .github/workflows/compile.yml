name: Compile Multiple MindAR Targets

on:
  push:
    paths:
      - '**/images/**'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Compile MindAR Targets
        run: |
          # imagesフォルダを持つすべてのディレクトリをループ処理
          for dir in $(find . -type d -name "images"); do
            target_dir=$(dirname "$dir")
            echo "Processing $target_dir..."
            
            # npxコマンドを使用して、インストールなしで直接コンパイラを呼び出します
            # これにより「コマンドが見つからない」エラー(127)を回避します
            npx mind-ar-compiler "$dir" "$target_dir/targets.mind"
          done

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add "**/targets.mind"
          if ! git diff --cached --exit-code; then
            git commit -m "Automated compile: target.mind updated"
            git push
          else
            echo "No changes to commit"
          fi
