<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #ui { position: absolute; top: 10px; left: 10px; z-index: 1000; display: flex; gap: 5px; }
      button { padding: 8px; background: rgba(0,0,0,0.5); color: white; border: 1px solid white; border-radius: 5px; }
    </style>
  </head>
  <body>
    <div id="ui">
      <button id="playBtn">Play Media</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./target.mind; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <img id="myPhoto" src="./assets/sample.png">
        <video id="myVideo" src="./assets/sample.mp4" loop="true" crossorigin="anonymous"></video>
        <a-asset-item id="myModel" src="./assets/sample.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-video src="#myVideo" position="0 0 0" height="1" width="1"></a-video>

        </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#myVideo');
      document.querySelector('#playBtn').addEventListener('click', () => {
        video.play(); // ボタンを押した時に動画の準備をする
      });
    </script>
  </body>
</html>
